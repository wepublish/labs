name: bench-dorfkoenig

# Warn-only benchmark of the Dorfkönig draft-quality pipeline (specs/DRAFT_QUALITY.md §4.4).
# Posts aggregate scores as a PR comment. Never blocks merge.
# Never logs prompts/responses — only scores (avoids leaking fixture text).

on:
  pull_request:
    paths:
      - 'src/dorfkoenig/supabase/functions/_shared/prompts.ts'
      - 'src/dorfkoenig/supabase/functions/_shared/draft-quality.ts'
      - 'src/dorfkoenig/supabase/functions/_shared/compose-draft.ts'
      - 'src/dorfkoenig/supabase/functions/_shared/*-extraction-prompt.ts'
      - 'src/dorfkoenig/supabase/functions/bajour-auto-draft/**'
      - 'src/dorfkoenig/supabase/functions/compose/**'
      - 'src/dorfkoenig/supabase/functions/_tests/fixtures/**'
      - 'src/dorfkoenig/supabase/functions/_tests/bench/**'
      - '.github/workflows/bench-dorfkoenig.yml'

jobs:
  bench:
    runs-on: ubuntu-latest
    # Warn-only: never fail the job even if the bench reports regressions.
    continue-on-error: true
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run benchmark
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY_BENCH }}
          BENCH_MAX_TOKENS_PER_RUN: '10000'
        run: |
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "OPENROUTER_API_KEY_BENCH secret not set — skipping bench (fork PR or missing secret)."
            echo "skipped=true" >> $GITHUB_ENV
            exit 0
          fi
          npm run bench:dorfkoenig -- --output bench-report.json || true
      - name: Extract scores
        if: env.skipped != 'true'
        id: scores
        run: |
          if [ ! -f bench-report.json ]; then
            echo "report=No bench report produced." >> $GITHUB_OUTPUT
            exit 0
          fi
          # Scores-only summary — DO NOT include prompts/responses.
          node -e "
            const r = JSON.parse(require('fs').readFileSync('bench-report.json','utf8'));
            const lines = [];
            lines.push('**Dorfkönig bench** — model=' + (r.config.model || 'default') + ', temperature=' + r.config.temperature);
            lines.push('');
            lines.push('| Fixture | Score | Pass |');
            lines.push('|---|---|---|');
            for (const run of r.runs) {
              lines.push('| ' + run.fixture_id + ' | ' + run.aggregate_score + '/100 | ' + (run.pass ? '✓' : '✗') + ' |');
            }
            lines.push('');
            lines.push('**Aggregate:** ' + r.aggregate_score + '/100 ' + (r.pass ? '(PASS)' : '(FAIL)'));
            require('fs').writeFileSync('bench-comment.md', lines.join('\\n'));
          "
      - name: Post PR comment
        if: env.skipped != 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('bench-comment.md')) return;
            const body = fs.readFileSync('bench-comment.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
